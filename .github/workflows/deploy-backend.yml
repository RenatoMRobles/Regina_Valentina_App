name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF — no static keys)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/938250627989/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'robles-gateway-sa@academia-robles-cloudrun.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (from source)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: regina-valentina
          region: us-central1
          source: ./backend
          project_id: academia-robles-cloudrun
